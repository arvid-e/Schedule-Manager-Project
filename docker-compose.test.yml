services:
  api:
    build:
      context: ./server 
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      - PORT=3000
      - MONGO_USER
      - MONGO_PASSWORD
      - JWT_SECRET
      - JWT_EXPIRES_IN
      - BCRYPT_SALT_ROUNDS
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/testdb?authSource=admin

  mongodb:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
